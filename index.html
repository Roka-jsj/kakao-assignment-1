<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니멀 Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1 class="app-title">To-Do List</h1>
        
        <div class="weekly-section">
            <div class="week-header">
                <button id="prev-week-btn" class="nav-btn">◀</button>
                <h2 id="current-month-display" class="date-title"></h2>
                <button id="next-week-btn" class="nav-btn">▶</button>
            </div>
            <div class="week-calendar" id="week-calendar"></div>
        </div>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요...">
            <button id="add-btn">추가</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행 중</button>
            <button class="filter-btn" data-filter="completed">완료</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
